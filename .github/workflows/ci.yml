name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (release)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # System libraries the gtk4 / webkit6 crates link against. ubuntu-24.04
      # ships GTK 4.14 (glogout's minimum). meson/ninja/libwayland are here to
      # build gtk4-layer-shell from source below.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libwayland-dev \
            meson \
            ninja-build

      # gtk4-layer-shell has no apt package on ubuntu-24.04 (it landed in 24.10),
      # so build the pinned release from source. introspection/vapi are disabled
      # since the Rust crate only links the C library.
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 --branch v1.3.0 \
            https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build \
            -Dintrospection=false -Dvapi=false \
            -Dexamples=false -Ddocs=false -Dtests=false -Dsmoke-tests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked
